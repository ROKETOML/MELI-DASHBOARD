<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --accent:#FFE600;--green:#22c55e;--red:#ef4444;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
.shell{max-width:900px;margin:0 auto;padding:28px 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.topbar-l{display:flex;align-items:center;gap:10px}
.ml-badge{background:var(--accent);color:#111;font-weight:600;font-size:11px;padding:4px 10px;border-radius:6px;letter-spacing:.5px}
.topbar h1{font-size:15px;font-weight:500;color:var(--text)}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:100px;padding:4px 12px;font-size:11px;color:var(--green);font-weight:500}
.live-pill.off{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 16px}
.kpi-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;font-weight:500;margin-bottom:10px}
.kpi-val{font-size:26px;font-weight:600;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.kpi-val.accent{color:var(--accent)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--border)}
.pt{font-size:13px;font-weight:500;color:var(--text)}
.pc{font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:2px 9px;border-radius:100px}
.vtable{width:100%;border-collapse:collapse}
.vtable th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:500;padding:10px 18px;text-align:left;border-bottom:1px solid var(--border)}
.vtable th:last-child{text-align:right}
.vtable td{padding:11px 18px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
.vtable tr:last-child td{border-bottom:none}
.vtable tr:hover td{background:var(--bg3)}
.vtable td:last-child{text-align:right;font-family:var(--mono);font-weight:500}
.vtable td.muted{color:var(--text2);font-size:12px}
.new-row td{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.empty{padding:40px 18px;text-align:center;color:var(--text3);font-size:13px}
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--green);border-radius:10px;padding:12px 16px;min-width:220px;animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.toast-title{font-size:11px;font-weight:600;color:var(--green);margin-bottom:2px}
.toast-body{font-size:12px;color:var(--text2)}
.toast-amt{font-size:16px;font-weight:600;color:var(--text);font-family:var(--mono)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-l">
      <span class="ml-badge">ML</span>
      <h1>Ventas del día</h1>
    </div>
    <div class="live-pill off" id="livePill">
      <span class="dot"></span>
      <span id="liveLabel">Conectando...</span>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-lbl">Total del día</div>
      <div class="kpi-val accent" id="kTotal">ARS 0</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Órdenes</div>
      <div class="kpi-val" id="kOrdenes">0</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Ticket promedio</div>
      <div class="kpi-val" id="kTicket">—</div>
    </div>
  </div>
  <div class="panel">
    <div class="ph">
      <span class="pt">Ventas de hoy</span>
      <span class="pc" id="cVentas">0</span>
    </div>
    <div id="ventasWrap">
      <div class="empty">Esperando ventas...</div>
    </div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>
<script>
const S = { ventas: [], stats: { hoy: { monto: 0, ordenes: 0 } } };
function fmt(n) { return n != null ? Math.round(n).toLocaleString('es-AR') : '—'; }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function renderKPIs() {
  const d = S.stats.hoy;
  const ticket = d.ordenes > 0 ? Math.round(d.monto / d.ordenes) : 0;
  document.getElementById('kTotal').textContent   = 'ARS ' + fmt(d.monto);
  document.getElementById('kOrdenes').textContent = d.ordenes;
  document.getElementById('kTicket').textContent  = ticket > 0 ? 'ARS ' + fmt(ticket) : '—';
}
function renderVentas(nuevaId) {
  const wrap = document.getElementById('ventasWrap');
  document.getElementById('cVentas').textContent = S.ventas.length;
  if (!S.ventas.length) { wrap.innerHTML = '<div class="empty">Esperando ventas...</div>'; return; }
  const filas = S.ventas.map(v => {
    const tit = v.items?.length ? (v.items.length === 1 ? v.items[0].titulo : v.items[0].titulo + ' +' + (v.items.length-1)) : 'Venta';
    const esNueva = v.id == nuevaId ? ' new-row' : '';
    return `<tr class="${esNueva}">
      <td class="muted">${esc(v.hora||'')}</td>
      <td>${esc(tit)}</td>
      <td class="muted">${esc(v.comprador)}</td>
      <td>ARS ${fmt(v.total)}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="vtable"><thead><tr>
    <th style="width:70px">Hora</th><th>Producto</th><th>Comprador</th><th>Monto</th>
  </tr></thead><tbody>${filas}</tbody></table>`;
}
function showToast(venta) {
  const wrap = document.getElementById('toasts');
  const tit = venta.items?.length ? venta.items[0].titulo : 'Venta';
  const d = document.createElement('div');
  d.className = 'toast';
  d.innerHTML = `<div class="toast-title">Nueva venta</div><div class="toast-body">${esc(tit)}</div><div class="toast-amt">ARS ${fmt(venta.total)}</div>`;
  wrap.appendChild(d);
  setTimeout(() => d.remove(), 5000);
}
let ws, wsTimer;
function conectar() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    document.getElementById('livePill').classList.remove('off');
    document.getElementById('liveLabel').textContent = 'en vivo';
    clearTimeout(wsTimer);
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.tipo === 'init') {
      if (msg.datos.stats) S.stats = msg.datos.stats;
      if (msg.datos.ventasRecientes) S.ventas = msg.datos.ventasRecientes;
      renderKPIs(); renderVentas();
    }
    if (msg.tipo === 'venta_nueva') {
      if (msg.datos.stats) S.stats = msg.datos.stats;
      S.ventas.unshift(msg.datos.venta);
      if (S.ventas.length > 100) S.ventas.pop();
      renderKPIs(); renderVentas(msg.datos.venta.id); showToast(msg.datos.venta);
    }
  };
  ws.onclose = () => {
    document.getElementById('livePill').classList.add('off');
    document.getElementById('liveLabel').textContent = 'reconectando...';
    wsTimer = setTimeout(conectar, 3000);
  };
  ws.onerror = () => ws.close();
}
async function cargarInicial() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    if (d.stats) S.stats = d.stats;
    if (d.ventasRecientes) S.ventas = d.ventasRecientes;
    renderKPIs(); renderVentas();
  } catch(e) { console.error(e); }
}
cargarInicial();
conectar();
</script>
</body>
</html>
